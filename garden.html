<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Garden of Thoughts</title>
  <link rel="icon" href="assets/favicon-garden.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f7f9f2;
      --ink: #18261b;
      --muted: #647567;
      --line: rgba(24, 38, 27, 0.11);
      --line-strong: rgba(24, 38, 27, 0.2);
      --paper: rgba(255, 255, 255, 0.8);
      --paper-strong: rgba(255, 255, 255, 0.92);
      --shadow-soft: 0 10px 30px rgba(38, 58, 42, 0.08);
      --moss: #d9e6ce;
      --water-1: #dff2f5;
      --water-2: #c2e1e6;
      --water-3: #95c0cb;
      --water-4: #729eab;
      --seed: #a98762;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: Inter, system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 100% 0%, rgba(227, 239, 219, 0.55), rgba(227, 239, 219, 0) 18%),
        linear-gradient(180deg, #fbfcf8 0%, #f5f7f1 100%);
    }

    .wrap {
      max-width: 1160px;
      margin: 0 auto;
      padding: 30px 28px 84px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      color: var(--muted);
      font-size: 12px;
      gap: 16px;
      flex-wrap: wrap;
    }

    .topbar a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid var(--line-strong);
    }

    .topbar a:hover {
      color: var(--ink);
      border-bottom-color: var(--ink);
    }

    .hero {
      max-width: 720px;
      margin-bottom: 18px;
    }

    .eyebrow {
      margin-bottom: 12px;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }

    h1 {
      margin: 0 0 12px;
      font-family: "Source Serif 4", Georgia, serif;
      font-weight: 500;
      font-size: clamp(34px, 4.8vw, 54px);
      line-height: 1;
      letter-spacing: -0.035em;
    }

    .hero p {
      margin: 0;
      max-width: 640px;
      color: #5f705f;
      font-size: 15px;
      line-height: 1.72;
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .detail-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .meta-chip,
    .detail-kicker {
      display: inline-flex;
      align-items: center;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.74);
      color: var(--muted);
      font-size: 12px;
    }

    .scene-card {
      border: 1px solid rgba(24, 38, 27, 0.09);
      border-radius: 28px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.82), rgba(255, 255, 255, 0.7)),
        linear-gradient(180deg, #f3f7ed 0%, #eaf1e1 100%);
      box-shadow: 0 26px 64px rgba(38, 58, 42, 0.09);
      overflow: hidden;
    }

    .scene-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.56);
      backdrop-filter: blur(14px);
    }

    .controls {
      display: inline-flex;
      gap: 4px;
      padding: 4px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.72);
    }

    .controls button {
      border: 0;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-size: 12px;
      padding: 8px 14px;
      border-radius: 999px;
      cursor: pointer;
    }

    .controls button.active {
      background: #eef4e8;
      color: var(--ink);
      box-shadow: inset 0 0 0 1px rgba(24, 38, 27, 0.06);
    }

    .view-panel { display: none; }
    .view-panel.active { display: block; }

    .scene-shell {
      position: relative;
      min-height: 560px;
      padding: 20px;
      overflow: hidden;
      background:
        radial-gradient(ellipse at 16% 18%, rgba(250, 255, 241, 0.72), rgba(250, 255, 241, 0) 34%),
        radial-gradient(ellipse at 88% 74%, rgba(188, 211, 169, 0.32), rgba(188, 211, 169, 0) 36%),
        linear-gradient(180deg, #eef5e7 0%, #e2edd8 100%);
    }

    .scene-shell::before,
    .scene-shell::after {
      content: "";
      position: absolute;
      pointer-events: none;
      z-index: 0;
    }

    .scene-shell::before {
      left: 5%;
      right: 7%;
      bottom: -18%;
      height: 44%;
      border-radius: 52% 48% 0 0 / 72% 64% 0 0;
      background:
        radial-gradient(ellipse at 18% 44%, rgba(87, 122, 69, 0.18), rgba(87, 122, 69, 0) 38%),
        radial-gradient(ellipse at 76% 36%, rgba(116, 143, 88, 0.16), rgba(116, 143, 88, 0) 42%),
        linear-gradient(180deg, rgba(207, 222, 189, 0), rgba(171, 195, 146, 0.56));
      filter: blur(0.2px);
    }

    .scene-shell::after {
      inset: 0;
      background-image:
        radial-gradient(circle at 11% 76%, rgba(89, 112, 75, 0.16) 0 2px, transparent 2.5px),
        radial-gradient(circle at 18% 82%, rgba(89, 112, 75, 0.13) 0 1.5px, transparent 2px),
        radial-gradient(circle at 86% 24%, rgba(89, 112, 75, 0.12) 0 2px, transparent 2.5px),
        radial-gradient(circle at 91% 31%, rgba(89, 112, 75, 0.1) 0 1.5px, transparent 2px);
      opacity: 0.8;
    }

    .pond-basin {
      position: absolute;
      inset: 30px 38px 36px 34px;
      padding: 18px;
      border-radius: 49% 51% 53% 47% / 43% 48% 52% 57%;
      background:
        radial-gradient(ellipse at 17% 18%, rgba(253, 255, 247, 0.7), rgba(253, 255, 247, 0) 36%),
        radial-gradient(ellipse at 83% 82%, rgba(78, 104, 67, 0.16), rgba(78, 104, 67, 0) 44%),
        linear-gradient(135deg, rgba(214, 229, 198, 0.94), rgba(154, 180, 137, 0.72));
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.5),
        inset 0 -22px 42px rgba(79, 105, 70, 0.16);
      z-index: 1;
    }

    .pond {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      border-radius: 50% 50% 52% 48% / 43% 47% 53% 57%;
      background:
        radial-gradient(ellipse at 28% 18%, rgba(255, 255, 255, 0.46), rgba(255, 255, 255, 0) 20%),
        radial-gradient(ellipse at 70% 72%, rgba(28, 85, 100, 0.32), rgba(28, 85, 100, 0) 30%),
        radial-gradient(ellipse at 47% 46%, #dff5f0 0%, #bddfdc 38%, #82b2bc 68%, #5d8798 100%);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.34),
        inset 0 22px 30px rgba(255, 255, 255, 0.22),
        inset 0 -72px 88px rgba(36, 76, 89, 0.32),
        inset 28px 0 52px rgba(216, 241, 226, 0.2);
      isolation: isolate;
    }

    .pond::before,
    .pond::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .pond::before {
      background:
        linear-gradient(118deg, rgba(255, 255, 255, 0.19), rgba(255, 255, 255, 0) 27%),
        repeating-linear-gradient(172deg, rgba(255, 255, 255, 0.045) 0 1px, rgba(255, 255, 255, 0) 1px 17px),
        repeating-linear-gradient(12deg, rgba(38, 91, 95, 0.035) 0 1px, rgba(38, 91, 95, 0) 1px 22px);
      background-size: auto, 100% 34px, 100% 42px;
      mix-blend-mode: screen;
      opacity: 0.9;
      animation: water-drift 12s linear infinite;
    }

    .pond::after {
      background:
        radial-gradient(ellipse at 21% 23%, rgba(255, 255, 255, 0.28), rgba(255, 255, 255, 0) 18%),
        radial-gradient(ellipse at 62% 38%, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0) 20%),
        radial-gradient(ellipse at 75% 76%, rgba(32, 77, 92, 0.18), rgba(32, 77, 92, 0) 24%);
      opacity: 0.92;
      animation: water-shimmer 8s ease-in-out infinite alternate;
    }

    @keyframes water-drift {
      from { background-position: 0 0, 0 0, 0 0; }
      to { background-position: 0 0, 38px 34px, -44px 42px; }
    }

    @keyframes water-shimmer {
      from { transform: translate3d(-0.6%, -0.4%, 0) scale(1.01); opacity: 0.82; }
      to { transform: translate3d(0.7%, 0.5%, 0) scale(1.018); opacity: 0.96; }
    }

    .water-glint,
    .duckweed,
    .ambient-pad {
      position: absolute;
      pointer-events: none;
      z-index: 2;
    }

    .water-glint {
      width: var(--w, 96px);
      height: 1px;
      left: var(--x);
      top: var(--y);
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.5), transparent);
      opacity: var(--o, 0.5);
      transform: rotate(var(--rot, -8deg));
    }

    .duckweed {
      width: 4px;
      height: 4px;
      left: var(--x);
      top: var(--y);
      border-radius: 50%;
      background: rgba(130, 172, 88, 0.74);
      box-shadow:
        7px 3px 0 rgba(151, 189, 105, 0.56),
        13px -2px 0 rgba(116, 158, 79, 0.46),
        -5px 4px 0 rgba(151, 189, 105, 0.5);
      opacity: 0.64;
    }

    .ripple,
    .reed-cluster {
      position: absolute;
      pointer-events: none;
    }

    .ripple {
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      opacity: 0.26;
      z-index: 2;
    }

    .ripple.one { animation: breathe 7.6s ease-in-out infinite; }
    .ripple.two { animation: breathe 8.8s ease-in-out infinite reverse; }

    @keyframes breathe {
      0%, 100% { transform: scale(0.98); opacity: 0.28; }
      50% { transform: scale(1.04); opacity: 0.44; }
    }

    .reed-cluster { bottom: 18px; z-index: 2; }
    .reed {
      position: absolute;
      bottom: 0;
      width: 2px;
      border-radius: 2px;
      background: linear-gradient(180deg, rgba(118, 149, 88, 0.92), rgba(71, 98, 56, 0.92));
      transform-origin: bottom center;
      opacity: 0.78;
    }

    .lily {
      position: absolute;
      left: var(--x);
      top: var(--y);
      transform: translate(-50%, -50%);
      z-index: 4;
      border: 0;
      background: transparent;
      padding: 0;
      cursor: pointer;
      font: inherit;
      color: inherit;
      animation: drift var(--drift, 8.2s) ease-in-out infinite;
      animation-delay: var(--delay, 0s);
    }

    .lily.selected { z-index: 6; }
    .lily-inner {
      position: relative;
      width: var(--size, 56px);
      height: var(--size, 56px);
      transition: transform 0.18s ease, filter 0.18s ease;
    }

    .lily:hover .lily-inner,
    .lily.selected .lily-inner {
      transform: translateY(-2px) scale(1.035);
      filter: brightness(1.02);
    }

    .lily-shadow {
      position: absolute;
      inset: 54% 8% 5% 8%;
      border-radius: 50%;
      background: rgba(20, 55, 48, 0.19);
      filter: blur(10px);
      transform: translateY(5px) scale(0.9);
    }

    .lily-pad {
      position: absolute;
      inset: 0;
      transform: rotate(var(--rot, -10deg));
    }

    .pad-svg {
      width: 100%;
      height: 100%;
      display: block;
      overflow: visible;
      filter: drop-shadow(0 9px 12px rgba(23, 61, 42, 0.18));
    }

    .pad-fill { fill: var(--pad-fill); }
    .pad-edge { fill: none; stroke: rgba(37, 82, 42, 0.36); stroke-width: 1.7; }
    .pad-vein-main { stroke: rgba(237, 255, 205, 0.58); stroke-width: 1.25; stroke-linecap: round; fill: none; }
    .pad-vein-shadow { stroke: rgba(42, 92, 43, 0.22); stroke-width: 0.9; stroke-linecap: round; fill: none; }
    .pad-notch-shadow { fill: rgba(41, 89, 46, 0.18); }
    .pad-speckle { fill: rgba(255, 255, 255, 0.18); }

    .lily.kind-young .lily-pad {
      opacity: 0.94;
    }

    .lily.latest .pad-svg {
      filter:
        drop-shadow(0 0 0 rgba(255, 255, 255, 0.3))
        drop-shadow(0 9px 12px rgba(23, 61, 42, 0.2));
    }

    .ambient-pad {
      width: var(--size, 42px);
      height: var(--size, 42px);
      left: var(--x);
      top: var(--y);
      transform: translate(-50%, -50%) rotate(var(--rot, 0deg));
      opacity: var(--o, 0.46);
    }

    .ambient-pad .pad-svg {
      filter: drop-shadow(0 5px 8px rgba(23, 61, 42, 0.12));
    }

    .lily.kind-draft .lily-inner {
      width: 20px;
      height: 20px;
    }

    .seed-cluster {
      position: absolute;
      inset: 0;
    }

    .seed-dot {
      position: absolute;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--seed);
      box-shadow:
        inset -1px -1px 0 rgba(0, 0, 0, 0.16),
        0 2px 5px rgba(27, 36, 27, 0.18);
    }

    .seed-dot.a { left: 4px; top: 7px; }
    .seed-dot.b { left: 9px; top: 2px; }
    .seed-dot.c { left: 11px; top: 10px; }

    .bloom {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 28px;
      height: 28px;
      transform: translate(-50%, -66%);
      pointer-events: none;
      filter: drop-shadow(0 4px 7px rgba(80, 96, 70, 0.16));
    }

    .bloom.big {
      width: 38px;
      height: 38px;
      transform: translate(-50%, -64%);
    }

    .petal {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 13px;
      height: 9px;
      border-radius: 60% 40% 58% 42% / 62% 52% 48% 38%;
      background:
        radial-gradient(circle at 34% 28%, rgba(255, 255, 255, 0.38), rgba(255, 255, 255, 0) 40%),
        linear-gradient(180deg, #fae4ea 0%, #efc4d0 100%);
      transform-origin: 50% 130%;
    }

    .bloom.big .petal {
      width: 16px;
      height: 11px;
    }

    .bloom.rare .petal {
      background:
        radial-gradient(circle at 35% 30%, rgba(255, 255, 255, 0.3), rgba(255, 255, 255, 0) 42%),
        linear-gradient(180deg, #e8d2ee 0%, #d7b4de 100%);
    }

    .petal:nth-child(1) { transform: translate(-50%, -50%) rotate(0deg) translateY(-7px) scale(1.02); }
    .petal:nth-child(2) { transform: translate(-50%, -50%) rotate(36deg) translateY(-5.9px) scale(0.9); }
    .petal:nth-child(3) { transform: translate(-50%, -50%) rotate(72deg) translateY(-7px) scale(1.02); }
    .petal:nth-child(4) { transform: translate(-50%, -50%) rotate(108deg) translateY(-5.9px) scale(0.9); }
    .petal:nth-child(5) { transform: translate(-50%, -50%) rotate(144deg) translateY(-7px) scale(1.02); }
    .petal:nth-child(6) { transform: translate(-50%, -50%) rotate(180deg) translateY(-5.9px) scale(0.9); }
    .petal:nth-child(7) { transform: translate(-50%, -50%) rotate(216deg) translateY(-7px) scale(1.02); }
    .petal:nth-child(8) { transform: translate(-50%, -50%) rotate(252deg) translateY(-5.9px) scale(0.9); }
    .petal:nth-child(9) { transform: translate(-50%, -50%) rotate(288deg) translateY(-7px) scale(1.02); }
    .petal:nth-child(10) { transform: translate(-50%, -50%) rotate(324deg) translateY(-5.9px) scale(0.9); }

    .core {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle at 35% 35%, #fff7d7 0%, #f5df9f 56%, #dcbf66 100%);
      box-shadow: 0 0 0 1.5px rgba(255, 255, 255, 0.64);
    }

    .ring {
      position: absolute;
      left: 50%;
      top: 50%;
      width: calc(var(--size, 56px) + 18px);
      height: calc(var(--size, 56px) + 18px);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      border: 1px solid rgba(255, 255, 255, 0.18);
      opacity: 0;
      transition: opacity 0.18s ease, transform 0.18s ease;
      pointer-events: none;
    }

    .lily.selected .ring {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1.02);
    }

    .lily-hint {
      position: absolute;
      left: 50%;
      top: calc(100% + 10px);
      transform: translateX(-50%);
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(24, 38, 27, 0.08);
      box-shadow: 0 12px 20px rgba(33, 54, 40, 0.1);
      color: var(--ink);
      font-size: 11px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.14s ease;
    }

    .lily:hover .lily-hint { opacity: 1; }

    @keyframes drift {
      0%, 100% { transform: translate(-50%, -50%) rotate(-1.1deg); }
      50% { transform: translate(-50%, -49.3%) rotate(1deg); }
    }

    .frog {
      position: absolute;
      left: 72%;
      top: 20%;
      width: 30px;
      height: 24px;
      transform: translate(-50%, -50%) rotate(10deg);
      pointer-events: none;
      z-index: 4;
    }

    .frog-head,
    .frog-body {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(180deg, #9bd47c 0%, #69aa58 100%);
      border-radius: 52% 48% 44% 56% / 60% 60% 40% 40%;
    }

    .frog-head {
      top: 2px;
      width: 17px;
      height: 12px;
    }

    .frog-body {
      bottom: 0;
      width: 18px;
      height: 13px;
    }

    .frog-eye {
      position: absolute;
      top: 2px;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: radial-gradient(circle at 50% 50%, #1f2c18 0 24%, #f8fff0 25% 58%, #7ab565 59% 100%);
    }

    .frog-eye.left { left: 5px; }
    .frog-eye.right { right: 5px; }

    .catalog {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      padding: 18px;
    }

    .catalog-column {
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.72);
      box-shadow: var(--shadow-soft);
    }

    .catalog-column h3 {
      margin: 0 0 12px;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
    }

    .catalog-list {
      display: grid;
      gap: 10px;
    }

    .catalog-item,
    .empty-state {
      width: 100%;
      text-align: left;
      border-radius: 16px;
      padding: 12px;
      border: 1px solid transparent;
      background: rgba(255, 255, 255, 0.82);
      color: inherit;
      font: inherit;
      text-decoration: none;
      display: block;
    }

    .catalog-item:hover,
    .catalog-item.selected {
      border-color: var(--line-strong);
      background: var(--paper-strong);
    }

    .catalog-item .kind {
      margin-bottom: 5px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .catalog-item strong {
      display: block;
      margin-bottom: 3px;
      font-family: "Source Serif 4", Georgia, serif;
      font-size: 17px;
      font-weight: 500;
      letter-spacing: -0.01em;
    }

    .catalog-item span,
    .empty-state {
      font-size: 12px;
      line-height: 1.55;
      color: var(--muted);
    }

    .catalog-badge {
      display: inline-flex;
      align-items: center;
      margin-top: 8px;
      padding: 5px 8px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(246, 251, 243, 0.9);
      font-size: 11px;
      color: var(--muted);
    }

    .empty-pond {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 5;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid var(--line);
      text-align: center;
      color: var(--muted);
      max-width: 320px;
      line-height: 1.6;
    }

    @media (max-width: 820px) {
      .catalog { grid-template-columns: 1fr; }
      .scene-shell { min-height: 440px; padding: 14px; }
      .pond-basin { inset: 24px 18px 24px 16px; }
    }

    @media (max-width: 620px) {
      .wrap { padding: 22px 16px 64px; }
      .controls { width: 100%; justify-content: space-between; }
      .controls button { flex: 1; text-align: center; }
      .scene-shell { min-height: 390px; }
      .lily-hint { display: none; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a href="notebook.html">← back to notebook</a>
      <a href="garden-post.html?slug=introduction">latest bloom</a>
    </div>

    <section class="hero">
      <div class="eyebrow">Garden of thoughts</div>
      <h1 id="hero-title">A pond that fills slowly.</h1>
      <p id="hero-copy"></p>
    </section>

    <div class="meta-row">
    </div>

    <section class="scene-card">
      <div class="scene-top">
        <div class="controls" role="tablist" aria-label="Garden views">
          <button type="button" data-view="pond" class="active">Pond view</button>
          <button type="button" data-view="columns">Column view</button>
        </div>
      </div>

      <div class="view-panel active" id="view-pond">
        <div class="scene-shell">
          <div class="pond-basin">
            <div class="pond" id="pond" aria-label="Pond of thoughts"></div>
          </div>
        </div>

      </div>

      <div class="view-panel" id="view-columns">
        <section class="catalog">
          <div class="catalog-column">
            <h3>Long posts</h3>
            <div class="catalog-list" id="catalog-long-posts"></div>
          </div>
          <div class="catalog-column">
            <h3>Notes</h3>
            <div class="catalog-list" id="catalog-notes"></div>
          </div>
          <div class="catalog-column">
            <h3>Scattered thoughts</h3>
            <div class="catalog-list" id="catalog-scattered-thoughts"></div>
          </div>
        </section>
      </div>
    </section>
  </div>

  <script src="assets/garden-posts.js"></script>
  <script>
    let SETTINGS = window.GARDEN_SETTINGS || {};
    const STAGE_INFO = window.GARDEN_STAGE_INFO || {};
    let POSTS = [];

    const pond = document.getElementById("pond");
    const catalogLongPosts = document.getElementById("catalog-long-posts");
    const catalogNotes = document.getElementById("catalog-notes");
    const catalogScatteredThoughts = document.getElementById("catalog-scattered-thoughts");
    const viewButtons = Array.from(document.querySelectorAll(".controls button"));
    const viewPanels = {
      pond: document.getElementById("view-pond"),
      columns: document.getElementById("view-columns")
    };

    let selectedSlug = "";

    const REEDS = [
      { side: "left", left: "8%", stems: [[0, 18, -10], [10, 26, -3], [19, 30, 5], [30, 24, 10], [39, 18, 14]] },
      { side: "right", right: "8%", stems: [[0, 24, -8], [10, 32, -2], [20, 28, 4], [30, 34, 10], [42, 20, 15]] }
    ];

    function stageInfo(post) {
      return STAGE_INFO[post.stage] || { label: "Post", group: "notes", visual: "pad" };
    }

    function visualFor(post) {
      return stageInfo(post).visual || "pad";
    }

    function postHref(post) {
      return "garden-post.html?slug=" + encodeURIComponent(post.slug);
    }

    function makeRipple(post, idx) {
      const ripple = document.createElement("div");
      const size = Math.max(82, (post.pond.size || 56) + 54);
      ripple.className = "ripple " + (idx % 2 === 0 ? "one" : "two");
      ripple.style.left = post.pond.x + "%";
      ripple.style.top = post.pond.y + "%";
      ripple.style.width = size + "px";
      ripple.style.height = size + "px";
      ripple.style.marginLeft = -(size / 2) + "px";
      ripple.style.marginTop = -(size / 2) + "px";
      return ripple;
    }

    const PAD_VARIANTS = {
      classic: {
        label: "Classic lily pad",
        path: "M51 9 C68 8 84 19 91 34 C98 51 92 70 78 82 C63 95 41 96 25 87 C9 78 2 61 8 43 C14 25 31 11 51 9 Z",
        notch: "M7 46 C24 47 38 50 53 54 C39 60 28 70 20 83 C11 75 6 62 7 46 Z",
        colors: ["#c9e9a4", "#82b66b", "#4f8547", "#335f37"]
      },
      young: {
        label: "Young pale pad",
        path: "M50 10 C65 8 81 17 89 31 C97 47 94 66 80 80 C66 94 43 96 27 88 C11 80 4 63 8 45 C12 28 30 13 50 10 Z",
        notch: "M8 45 C23 46 38 50 52 55 C39 60 28 69 20 82 C12 74 7 61 8 45 Z",
        colors: ["#edf8bd", "#b9d989", "#7fa765", "#5f844f"]
      },
      deep: {
        label: "Deep green pad",
        path: "M54 8 C72 9 89 22 94 40 C99 57 90 76 74 86 C57 97 35 93 21 82 C6 70 4 51 13 35 C22 18 36 7 54 8 Z",
        notch: "M12 36 C28 42 41 49 54 55 C39 58 25 64 14 75 C8 65 7 49 12 36 Z",
        colors: ["#acd48b", "#6fa35c", "#3f7440", "#275233"]
      },
      round: {
        label: "Round floating pad",
        path: "M50 7 C68 7 84 17 92 32 C100 48 96 69 82 82 C67 96 44 98 27 88 C10 78 2 60 7 42 C13 22 30 7 50 7 Z",
        notch: "M8 43 C24 45 39 49 55 54 C42 61 31 72 24 86 C13 77 6 61 8 43 Z",
        colors: ["#d5ed9f", "#93bf61", "#658f46", "#456a36"]
      }
    };

    function padVariantFor(postOrKind) {
      if (typeof postOrKind === "string") {
        return PAD_VARIANTS[postOrKind] || PAD_VARIANTS.classic;
      }
      const explicit = postOrKind && postOrKind.pond && postOrKind.pond.pad;
      if (explicit && PAD_VARIANTS[explicit]) return PAD_VARIANTS[explicit];
      if (postOrKind && postOrKind.stage === "young") return PAD_VARIANTS.young;
      if (postOrKind && postOrKind.stage === "rare") return PAD_VARIANTS.deep;
      if (postOrKind && postOrKind.stage === "pad") return PAD_VARIANTS.round;
      return PAD_VARIANTS.classic;
    }

    function gradientStops(colors) {
      return [
        '<stop offset="0%" stop-color="' + colors[0] + '"/>',
        '<stop offset="43%" stop-color="' + colors[1] + '"/>',
        '<stop offset="74%" stop-color="' + colors[2] + '"/>',
        '<stop offset="100%" stop-color="' + colors[3] + '"/>'
      ].join("");
    }

    function padSVG(postOrKind, variantId) {
      const variant = padVariantFor(postOrKind);
      const gradientId = "pad-fill-" + variantId;
      return [
        '<svg class="pad-svg" viewBox="0 0 100 100" aria-hidden="true">',
        '<defs>',
        '<radialGradient id="' + gradientId + '" cx="34%" cy="28%" r="74%">',
        gradientStops(variant.colors),
        '</radialGradient>',
        '</defs>',
        '<path class="pad-fill" style="--pad-fill:url(#' + gradientId + ')" d="' + variant.path + '"/>',
        '<path class="pad-notch-shadow" d="M10 48 C24 47 37 50 50 53 C39 59 28 68 20 79 C14 72 10 62 10 48 Z"/>',
        '<path fill="' + variant.colors[1] + '" opacity="0.96" d="' + variant.notch + '"/>',
        '<path class="pad-edge" d="' + variant.path + '"/>',
        '<path class="pad-vein-shadow" d="M51 54 C48 40 46 27 51 12"/>',
        '<path class="pad-vein-shadow" d="M51 54 C62 39 75 30 89 34"/>',
        '<path class="pad-vein-shadow" d="M51 54 C67 55 80 64 83 78"/>',
        '<path class="pad-vein-shadow" d="M51 54 C50 70 45 84 35 91"/>',
        '<path class="pad-vein-shadow" d="M51 54 C39 48 27 45 10 47"/>',
        '<path class="pad-vein-main" d="M51 54 C48 40 47 28 51 14"/>',
        '<path class="pad-vein-main" d="M51 54 C62 40 74 31 88 35"/>',
        '<path class="pad-vein-main" d="M51 54 C66 56 78 64 82 77"/>',
        '<path class="pad-vein-main" d="M51 54 C50 69 45 82 36 89"/>',
        '<path class="pad-vein-main" d="M51 54 C39 49 27 46 11 48"/>',
        '<circle class="pad-speckle" cx="34" cy="27" r="2.2"/>',
        '<circle class="pad-speckle" cx="66" cy="25" r="1.4"/>',
        '<circle class="pad-speckle" cx="74" cy="61" r="1.6"/>',
        '</svg>'
      ].join("");
    }

    function buildWaterDetails() {
      [
        { x: "22%", y: "29%", w: "116px", rot: "-8deg", o: 0.46 },
        { x: "58%", y: "24%", w: "78px", rot: "5deg", o: 0.34 },
        { x: "64%", y: "68%", w: "132px", rot: "-4deg", o: 0.26 },
        { x: "32%", y: "74%", w: "86px", rot: "8deg", o: 0.3 }
      ].forEach((item) => {
        const glint = document.createElement("div");
        glint.className = "water-glint";
        glint.style.setProperty("--x", item.x);
        glint.style.setProperty("--y", item.y);
        glint.style.setProperty("--w", item.w);
        glint.style.setProperty("--rot", item.rot);
        glint.style.setProperty("--o", item.o);
        pond.appendChild(glint);
      });

      [
        { x: "18%", y: "62%" },
        { x: "73%", y: "33%" },
        { x: "83%", y: "58%" },
        { x: "39%", y: "37%" }
      ].forEach((item) => {
        const weed = document.createElement("div");
        weed.className = "duckweed";
        weed.style.setProperty("--x", item.x);
        weed.style.setProperty("--y", item.y);
        pond.appendChild(weed);
      });
    }

    function buildAmbientPads() {
      [
        { x: "27%", y: "68%", size: 44, rot: 18, opacity: 0.36, kind: "young" },
        { x: "72%", y: "42%", size: 38, rot: -26, opacity: 0.32, kind: "pad" },
        { x: "38%", y: "31%", size: 34, rot: 36, opacity: 0.26, kind: "young" }
      ].forEach((item, idx) => {
        const pad = document.createElement("div");
        pad.className = "ambient-pad";
        pad.style.setProperty("--x", item.x);
        pad.style.setProperty("--y", item.y);
        pad.style.setProperty("--size", item.size + "px");
        pad.style.setProperty("--rot", item.rot + "deg");
        pad.style.setProperty("--o", item.opacity);
        pad.innerHTML = padSVG(item.kind, "ambient-" + idx);
        pond.appendChild(pad);
      });
    }

    function buildReeds() {
      REEDS.forEach((entry) => {
        const cluster = document.createElement("div");
        cluster.className = "reed-cluster";
        if (entry.left) cluster.style.left = entry.left;
        if (entry.right) cluster.style.right = entry.right;
        entry.stems.forEach(([left, height, rotate]) => {
          const stem = document.createElement("div");
          stem.className = "reed";
          stem.style.left = left + "px";
          stem.style.height = height + "px";
          stem.style.transform = "rotate(" + rotate + "deg)";
          cluster.appendChild(stem);
        });
        pond.appendChild(cluster);
      });
    }

    function createBloom(kind) {
      const bloom = document.createElement("div");
      bloom.className = "bloom" + (kind === "rare" ? " rare big" : "");
      for (let i = 0; i < 10; i++) {
        const petal = document.createElement("div");
        petal.className = "petal";
        bloom.appendChild(petal);
      }
      const core = document.createElement("div");
      core.className = "core";
      bloom.appendChild(core);
      return bloom;
    }

    function createFrog() {
      const frog = document.createElement("div");
      frog.className = "frog";
      frog.innerHTML = [
        '<div class="frog-head"></div>',
        '<div class="frog-body"></div>',
        '<div class="frog-eye left"></div>',
        '<div class="frog-eye right"></div>'
      ].join("");
      return frog;
    }

    function createLily(post) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "lily kind-" + post.stage;
      if (post.pond.latest) button.classList.add("latest");
      button.style.setProperty("--x", post.pond.x + "%");
      button.style.setProperty("--y", post.pond.y + "%");
      button.style.setProperty("--size", post.pond.size + "px");
      button.style.setProperty("--rot", post.pond.rot + "deg");
      button.style.setProperty("--drift", post.pond.drift + "s");
      button.style.setProperty("--delay", post.pond.delay + "s");
      button.dataset.slug = post.slug;
      button.setAttribute("aria-label", post.title);

      const ring = document.createElement("div");
      ring.className = "ring";
      button.appendChild(ring);

      const inner = document.createElement("div");
      inner.className = "lily-inner";

      const shadow = document.createElement("div");
      shadow.className = "lily-shadow";
      inner.appendChild(shadow);

      if (visualFor(post) === "seed") {
        const cluster = document.createElement("div");
        cluster.className = "seed-cluster";
        ["a", "b", "c"].forEach((name) => {
          const dot = document.createElement("div");
          dot.className = "seed-dot " + name;
          cluster.appendChild(dot);
        });
        inner.appendChild(cluster);
      } else {
        const pad = document.createElement("div");
        pad.className = "lily-pad";
        pad.innerHTML = padSVG(post, post.slug);
        inner.appendChild(pad);
        if (visualFor(post) === "flower") {
          inner.appendChild(createBloom(post.pond.flower || post.stage));
        }
        if (post.pond.latest) inner.appendChild(createFrog());
      }

      const hint = document.createElement("div");
      hint.className = "lily-hint";
      hint.textContent = post.title;
      inner.appendChild(hint);

      button.appendChild(inner);
      button.addEventListener("mouseenter", () => selectPost(post.slug));
      button.addEventListener("focus", () => selectPost(post.slug));
      button.addEventListener("click", () => { window.location.href = postHref(post); });
      return button;
    }

    function renderCatalogGroup(container, posts, emptyCopy) {
      container.innerHTML = "";
      if (!posts.length) {
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.textContent = emptyCopy;
        container.appendChild(empty);
        return;
      }

      posts.forEach((post) => {
        const item = document.createElement("a");
        item.className = "catalog-item";
        item.dataset.slug = post.slug;
        item.href = postHref(post);
        item.innerHTML =
          '<div class="kind">' + stageInfo(post).label + " · " + post.when + "</div>" +
          "<strong>" + post.title + "</strong>" +
          "<span>" + post.summary + "</span>" +
          (post.pond.latest ? '<div class="catalog-badge">Latest bloom</div>' : "");
        item.addEventListener("click", (event) => {
          if (event.metaKey || event.ctrlKey || event.shiftKey || event.altKey) return;
          event.preventDefault();
          selectPost(post.slug);
          window.location.href = item.href;
        });
        container.appendChild(item);
      });
    }

    function syncSelectedStates() {
      document.querySelectorAll(".lily, .catalog-item").forEach((el) => {
        el.classList.toggle("selected", el.dataset.slug === selectedSlug);
      });
    }

    function selectPost(slug) {
      const post = POSTS.find((entry) => entry.slug === slug) || POSTS[0];
      if (!post) return;
      selectedSlug = post.slug;
      syncSelectedStates();
    }

    function renderPond() {
      pond.innerHTML = "";
      if (!POSTS.length) {
        const empty = document.createElement("div");
        empty.className = "empty-pond";
        empty.textContent = "No blooms yet. Add a markdown file in content/garden/posts/.";
        pond.appendChild(empty);
        return;
      }

      POSTS.forEach((post, idx) => {
        if (visualFor(post) === "flower") pond.appendChild(makeRipple(post, idx));
      });
      buildWaterDetails();
      buildAmbientPads();
      buildReeds();
      POSTS.forEach((post) => pond.appendChild(createLily(post)));
    }

    function renderCatalog() {
      renderCatalogGroup(
        catalogLongPosts,
        POSTS.filter((post) => stageInfo(post).group === "longPosts"),
        "No long posts yet."
      );
      renderCatalogGroup(
        catalogNotes,
        POSTS.filter((post) => stageInfo(post).group === "notes"),
        "No notes yet."
      );
      renderCatalogGroup(
        catalogScatteredThoughts,
        POSTS.filter((post) => stageInfo(post).group === "scatteredThoughts"),
        "No scattered thoughts yet."
      );
      syncSelectedStates();
    }

    viewButtons.forEach((button) => {
      button.addEventListener("click", () => {
        const target = button.dataset.view;
        viewButtons.forEach((entry) => entry.classList.toggle("active", entry === button));
        Object.entries(viewPanels).forEach(([key, panel]) => {
          panel.classList.toggle("active", key === target);
        });
      });
    });

    (async () => {
      const content = window.loadGardenContent
        ? await window.loadGardenContent()
        : { settings: SETTINGS, posts: [] };
      SETTINGS = content.settings || SETTINGS;
      POSTS = content.posts || [];
      document.getElementById("hero-title").textContent = SETTINGS.introTitle || "Garden of Thoughts";
      document.getElementById("hero-copy").textContent = SETTINGS.introText || "";
      selectedSlug = POSTS.find((post) => post.pond.latest)?.slug || (POSTS[0] && POSTS[0].slug) || "";
      renderPond();
      renderCatalog();
      selectPost(selectedSlug);
    })().catch(() => {
      document.getElementById("hero-copy").textContent = "Could not load the garden content.";
      renderPond();
      renderCatalog();
    });
  </script>
</body>
</html>
