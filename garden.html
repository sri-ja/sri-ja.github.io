<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Garden of Thoughts</title>
  <link rel="icon" href="assets/favicon-garden.svg" type="image/svg+xml" />
  <script src="assets/theme.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: light;
      --bg: #fbfaf6;
      --paper: #fffdf8;
      --ink: #25231f;
      --muted: #706b62;
      --soft: #948d82;
      --line: rgba(37, 35, 31, 0.12);
      --line-strong: rgba(37, 35, 31, 0.22);
      --leaf: #4f7a52;
      --leaf-soft: #cfe3c5;
      --flower: #b85f75;
      --flower-soft: #f5cbd6;
      --seed: #a97745;
      --seed-soft: #dfbd92;
      --sun: #e3b74a;
      --sans: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --serif: "Source Serif 4", Georgia, serif;
    }
    html[data-theme="dark"] {
      color-scheme: dark;
      --bg: #111613;
      --paper: #171b16;
      --ink: #ebe5dc;
      --muted: #aaa093;
      --soft: #746b61;
      --line: rgba(235, 229, 220, 0.14);
      --line-strong: rgba(235, 229, 220, 0.24);
      --leaf: #95bf8d;
      --leaf-soft: #5f7f61;
      --flower: #d58da3;
      --flower-soft: #815260;
      --seed: #c99a68;
      --seed-soft: #a4754b;
      --sun: #e7c461;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.74), rgba(255, 255, 255, 0) 260px),
        repeating-linear-gradient(90deg, rgba(37, 35, 31, 0.025) 0 1px, transparent 1px 64px),
        var(--bg);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
    }
    html[data-theme="dark"] body {
      background:
        linear-gradient(180deg, rgba(23, 27, 22, 0.82), rgba(23, 27, 22, 0) 260px),
        repeating-linear-gradient(90deg, rgba(235, 229, 220, 0.035) 0 1px, transparent 1px 64px),
        var(--bg);
    }

    a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid var(--line-strong);
    }

    a:hover { border-bottom-color: currentColor; }

    .shell {
      width: min(1080px, calc(100% - 32px));
      margin: 0 auto;
      padding: 22px 0 64px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
      color: var(--muted);
      font-size: 12px;
      flex-wrap: wrap;
    }

    .topbar nav {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }
    .theme-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
    }
    .theme-toggle:hover {
      border-color: var(--line-strong);
      color: var(--ink);
    }
    .theme-toggle .theme-icon {
      position: relative;
      display: block;
      width: 13px;
      height: 13px;
      border-radius: 50%;
      box-shadow: inset -4px -2px 0 currentColor;
    }
    .theme-toggle[data-theme-state="dark"] .theme-icon {
      width: 10px;
      height: 10px;
      background: currentColor;
      box-shadow:
        0 -7px 0 -4px currentColor,
        0 7px 0 -4px currentColor,
        7px 0 0 -4px currentColor,
        -7px 0 0 -4px currentColor,
        5px 5px 0 -4px currentColor,
        -5px 5px 0 -4px currentColor,
        5px -5px 0 -4px currentColor,
        -5px -5px 0 -4px currentColor;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 24px;
      align-items: end;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }

    .kicker {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    h1 {
      margin: 0;
      max-width: 700px;
      font-family: var(--serif);
      font-size: clamp(32px, 5vw, 56px);
      font-weight: 500;
      line-height: 0.98;
      letter-spacing: 0;
    }

    .deck {
      max-width: 600px;
      margin: 10px 0 0;
      color: var(--muted);
      font-family: var(--serif);
      font-size: 17px;
      line-height: 1.55;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, auto);
      gap: 12px;
      align-items: end;
      color: var(--muted);
      font-size: 12px;
      text-align: right;
    }

    .stat strong {
      display: block;
      color: var(--ink);
      font-family: var(--serif);
      font-size: 24px;
      font-weight: 500;
      line-height: 1;
    }

    .filters {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-wrap: wrap;
      margin: 18px 0;
      color: var(--muted);
      font-size: 12px;
    }

    .filters button {
      border: 0;
      border-bottom: 1px solid transparent;
      background: transparent;
      color: inherit;
      padding: 4px 0;
      font: inherit;
      cursor: pointer;
    }

    .filters button.active {
      color: var(--ink);
      border-bottom-color: var(--ink);
    }

    .filters .dot {
      width: 3px;
      height: 3px;
      background: var(--soft);
      opacity: 0.75;
    }

    .layout {
      display: grid;
      grid-template-columns: 210px minmax(0, 1fr);
      gap: 30px;
      align-items: start;
    }

    .aside {
      position: sticky;
      top: 18px;
      padding-top: 4px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.65;
    }

    .aside h2 {
      margin: 0 0 10px;
      color: var(--ink);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .legend {
      display: grid;
      gap: 8px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
    }

    .legend-item {
      display: grid;
      grid-template-columns: 30px 1fr;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
    }

    .months {
      display: grid;
      gap: 7px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
    }

    .months a {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border: 0;
      color: var(--muted);
    }

    .months a:first-child { color: var(--ink); }

    .branch {
      position: relative;
      border-top: 1px solid var(--line-strong);
    }

    .branch::before {
      content: "";
      position: absolute;
      left: 116px;
      top: 0;
      bottom: 0;
      width: 1px;
      background: linear-gradient(180deg, transparent, rgba(79, 122, 82, 0.52) 42px, rgba(79, 122, 82, 0.2));
    }

    .entry {
      position: relative;
      display: grid;
      grid-template-columns: 86px 58px minmax(0, 1fr) 108px;
      gap: 16px;
      align-items: center;
      min-height: 78px;
      padding: 14px 0;
      border-bottom: 1px solid var(--line);
    }

    .entry::before {
      content: "";
      position: absolute;
      left: 116px;
      top: 50%;
      width: 24px;
      height: 1px;
      background: rgba(79, 122, 82, 0.3);
    }

    .entry:hover .entry-title {
      color: #14120f;
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 4px;
    }
    html[data-theme="dark"] .entry:hover .entry-title {
      color: var(--ink);
    }

    .when {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .when strong {
      display: block;
      color: var(--ink);
      font-size: 14px;
      font-weight: 600;
    }

    .entry-main { min-width: 0; }

    .entry-title {
      margin: 0;
      font-family: var(--serif);
      font-size: 21px;
      font-weight: 500;
      line-height: 1.18;
      letter-spacing: 0;
    }

    .summary {
      margin: 5px 0 0;
      max-width: 660px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .kind {
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      text-align: right;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .latest {
      display: inline-flex;
      margin-top: 7px;
      color: var(--leaf);
      font-size: 12px;
      font-weight: 600;
    }

    .mark {
      position: relative;
      display: inline-block;
      width: 28px;
      height: 28px;
      justify-self: center;
      z-index: 1;
      border-radius: 50%;
      background: radial-gradient(circle, var(--bg) 0 66%, rgba(251, 250, 246, 0) 68%);
      flex: 0 0 auto;
    }
    html[data-theme="dark"] .mark {
      background: radial-gradient(circle, var(--bg) 0 66%, rgba(17, 22, 19, 0) 68%);
    }

    .mark.flower::before {
      content: "";
      position: absolute;
      left: 9px;
      top: 17px;
      width: 10px;
      height: 7px;
      border-radius: 8px 1px 8px 1px;
      background: var(--leaf-soft);
      transform: rotate(-20deg);
      z-index: 0;
    }

    .mark.flower .petal {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 8px;
      height: 13px;
      margin-left: -4px;
      margin-top: -13px;
      border-radius: 70% 70% 52% 52%;
      background: var(--flower-soft);
      transform-origin: 50% 13px;
      z-index: 1;
    }

    .mark.flower .p1 { transform: rotate(0deg); }
    .mark.flower .p2 { transform: rotate(45deg); }
    .mark.flower .p3 { transform: rotate(90deg); }
    .mark.flower .p4 { transform: rotate(135deg); }
    .mark.flower .p5 { transform: rotate(180deg); }
    .mark.flower .p6 { transform: rotate(225deg); }
    .mark.flower .p7 { transform: rotate(270deg); }
    .mark.flower .p8 { transform: rotate(315deg); }

    .mark.flower i {
      position: absolute;
      left: 10px;
      top: 10px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--sun);
      z-index: 2;
    }

    .mark.leaf::before {
      content: "";
      position: absolute;
      left: 7px;
      top: 3px;
      width: 14px;
      height: 20px;
      border-radius: 15px 2px 15px 3px;
      background: var(--leaf-soft);
      transform: rotate(34deg);
    }

    .mark.leaf::after {
      content: "";
      position: absolute;
      left: 14px;
      top: 7px;
      width: 1px;
      height: 13px;
      border-radius: 999px;
      background: rgba(79, 122, 82, 0.28);
      transform: rotate(34deg);
    }

    .mark.seed::before {
      content: "";
      position: absolute;
      left: 9px;
      top: 7px;
      width: 11px;
      height: 14px;
      border-radius: 72% 46% 70% 46%;
      background: var(--seed-soft);
      transform: rotate(-24deg);
    }

    .mark.seed::after {
      content: "";
      position: absolute;
      left: 14px;
      top: 10px;
      width: 1px;
      height: 8px;
      border-radius: 999px;
      background: rgba(128, 82, 43, 0.24);
      transform: rotate(-24deg);
    }

    .empty {
      padding: 16px 0;
      color: var(--muted);
      border-bottom: 1px solid var(--line);
      font-size: 14px;
    }

    @media (max-width: 820px) {
      .hero,
      .layout {
        grid-template-columns: 1fr;
      }

      .stats {
        justify-content: start;
        text-align: left;
      }

      .aside { position: static; }

      .branch::before { left: 94px; }

      .entry {
        grid-template-columns: 68px 44px minmax(0, 1fr);
        gap: 12px;
      }

      .entry::before {
        left: 94px;
        width: 18px;
      }

      .kind { display: none; }
    }

    @media (max-width: 560px) {
      .shell {
        width: min(100% - 24px, 1080px);
        padding-top: 16px;
      }

      h1 { font-size: 35px; }
      .deck { font-size: 15px; }
      .stats {
        grid-template-columns: repeat(3, 1fr);
        width: 100%;
      }
      .stat strong { font-size: 21px; }
      .summary { display: none; }
      .entry-title { font-size: 18px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <a href="index.html">back to notebook</a>
      <nav aria-label="Garden links">
        <a href="garden-post.html?slug=introduction" id="latest-link">latest flower</a>
        <button class="theme-toggle" type="button" data-theme-toggle aria-label="Switch to dark mode" title="Switch to dark mode">
          <span class="theme-icon" aria-hidden="true"></span>
        </button>
      </nav>
    </header>

    <section class="hero">
      <div>
        <p class="kicker">Garden of Thoughts</p>
        <h1 id="hero-title">A garden for my thoughts and ideas to bloom.</h1>
        <p class="deck" id="hero-copy">Flowers are longer posts, leaves are notes, and seeds are ideas that are still taking shape.</p>
      </div>
      <div class="stats" aria-label="Writing counts">
        <div class="stat"><strong id="count-total">0</strong>pieces</div>
        <div class="stat"><strong id="count-long">0</strong>posts</div>
        <div class="stat"><strong id="count-notes">0</strong>notes</div>
      </div>
    </section>

    <div class="filters" aria-label="Writing filters">
      <button type="button" class="active" data-filter="all">All writing</button>
      <span class="dot"></span>
      <button type="button" data-filter="longPosts">Long posts</button>
      <span class="dot"></span>
      <button type="button" data-filter="notes">Notes</button>
      <span class="dot"></span>
      <button type="button" data-filter="scatteredThoughts">Fragments</button>
    </div>

    <section class="layout">
      <aside class="aside">
        <h2>Root</h2>

        <div class="legend" aria-label="Symbol legend">
          <div class="legend-item"><span class="mark flower"><span class="petal p1"></span><span class="petal p2"></span><span class="petal p3"></span><span class="petal p4"></span><span class="petal p5"></span><span class="petal p6"></span><span class="petal p7"></span><span class="petal p8"></span><i></i></span><span>Flower: longer post</span></div>
          <div class="legend-item"><span class="mark leaf"></span><span>Leaf: note</span></div>
          <div class="legend-item"><span class="mark seed"></span><span>Seed: fragment</span></div>
        </div>

        <div class="months" id="months"></div>
      </aside>

      <div class="branch" id="branch"></div>
    </section>
  </main>

  <script src="assets/garden-posts.js"></script>
  <script>
    let SETTINGS = window.GARDEN_SETTINGS || {};
    let POSTS = [];
    let activeFilter = "all";

    const branch = document.getElementById("branch");
    const months = document.getElementById("months");
    const filterButtons = Array.from(document.querySelectorAll("[data-filter]"));

    function escapeHTML(text) {
      return String(text || "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function stageInfo(post) {
      return (window.GARDEN_STAGE_INFO && window.GARDEN_STAGE_INFO[post.stage]) ||
        { label: "Post", group: "notes", visual: "leaf" };
    }

    function postHref(post) {
      return "garden-post.html?slug=" + encodeURIComponent(post.slug);
    }

    function visualFor(post) {
      const visual = stageInfo(post).visual;
      if (visual === "flower" || visual === "leaf" || visual === "seed") return visual;
      if (stageInfo(post).group === "longPosts") return "flower";
      if (stageInfo(post).group === "scatteredThoughts") return "seed";
      return "leaf";
    }

    function markHTML(visual) {
      const flower = '<span class="petal p1"></span><span class="petal p2"></span><span class="petal p3"></span><span class="petal p4"></span><span class="petal p5"></span><span class="petal p6"></span><span class="petal p7"></span><span class="petal p8"></span><i></i>';
      return '<span class="mark ' + visual + '" aria-hidden="true">' + (visual === "flower" ? flower : "") + '</span>';
    }

    function monthKey(post) {
      return post.when || "Soon";
    }

    function renderStats() {
      const longPosts = POSTS.filter((post) => stageInfo(post).group === "longPosts").length;
      const notes = POSTS.filter((post) => stageInfo(post).group === "notes").length;
      document.getElementById("count-total").textContent = POSTS.length;
      document.getElementById("count-long").textContent = longPosts;
      document.getElementById("count-notes").textContent = notes;
    }

    function renderMonths() {
      const counts = POSTS.reduce((acc, post) => {
        const key = monthKey(post);
        acc[key] = (acc[key] || 0) + 1;
        return acc;
      }, {});
      months.innerHTML = Object.entries(counts)
        .map(([label, count]) => '<a href="#branch"><span>' + escapeHTML(label) + '</span><span>' + count + '</span></a>')
        .join("");
    }

    function renderBranch() {
      const visible = activeFilter === "all"
        ? POSTS
        : POSTS.filter((post) => stageInfo(post).group === activeFilter);

      if (!visible.length) {
        branch.innerHTML = '<div class="empty">Nothing here yet.</div>';
        return;
      }

      branch.innerHTML = visible.map((post) => {
        const info = stageInfo(post);
        const visual = visualFor(post);
        const latest = post.pond && post.pond.latest ? '<span class="latest">latest</span>' : "";
        return [
          '<a class="entry" href="' + postHref(post) + '">',
          '<div class="when"><strong>' + escapeHTML(post.when || "Soon") + '</strong></div>',
          markHTML(visual),
          '<div class="entry-main">',
          '<h2 class="entry-title">' + escapeHTML(post.title) + '</h2>',
          '<p class="summary">' + escapeHTML(post.summary || "A note from the garden.") + '</p>',
          latest,
          '</div>',
          '<div class="kind">' + escapeHTML(info.label) + '</div>',
          '</a>'
        ].join("");
      }).join("");
    }

    filterButtons.forEach((button) => {
      button.addEventListener("click", () => {
        activeFilter = button.dataset.filter;
        filterButtons.forEach((item) => item.classList.toggle("active", item === button));
        renderBranch();
      });
    });

    (async () => {
      const content = window.loadGardenContent
        ? await window.loadGardenContent()
        : { settings: SETTINGS, posts: [] };
      SETTINGS = content.settings || SETTINGS;
      POSTS = content.posts || [];

      document.getElementById("hero-title").textContent =
        SETTINGS.introTitle || "A garden for my thoughts and ideas to bloom.";
      document.getElementById("hero-copy").textContent =
        SETTINGS.introText || "Flowers are longer posts, leaves are notes, and seeds are ideas that are still taking shape.";

      const latest = POSTS.find((post) => post.pond && post.pond.latest) || POSTS[0];
      if (latest) {
        const latestLink = document.getElementById("latest-link");
        latestLink.href = postHref(latest);
        latestLink.textContent = "latest " + visualFor(latest);
      }

      renderStats();
      renderMonths();
      renderBranch();
    })().catch(() => {
      branch.innerHTML = '<div class="empty">Could not load the garden branch.</div>';
    });
  </script>
</body>
</html>
